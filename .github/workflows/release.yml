name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/home-finance-api
  NODE_VERSION: "24"
  RUST_TOOLCHAIN: stable
  ANDROID_API_LEVEL: "35"
  ANDROID_NDK_VERSION: "28.0.13004108"

jobs:
  backend-docker:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android-app:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_API_LEVEL}.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Test frontend
        working-directory: apps/desktop
        run: npm run test

      - name: Lint frontend
        working-directory: apps/desktop
        run: npm run lint

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Prepare Android project
        working-directory: apps/desktop
        run: npm run tauri -- android init --ci

      - name: Build Android APK
        working-directory: apps/desktop
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.ANDROID_NDK_VERSION }}
        run: npm run tauri -- android build --debug --apk

      - name: Verify APK package metadata
        run: |
          AAPT_PATH="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          sudo ln -sf "$AAPT_PATH" /usr/local/bin/aapt
          sh scripts/verify-android-apks.sh apps/desktop/src-tauri/gen/android/app/build/outputs/apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: home-finance-android-apk
          path: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          generate_release_notes: true
